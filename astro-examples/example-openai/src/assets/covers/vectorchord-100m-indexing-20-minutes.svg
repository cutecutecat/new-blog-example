<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="960" height="480" viewBox="0 0 960 480" role="img" aria-label="20-Min Build cover">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#001219"/>
      <stop offset="55%" stop-color="#005f73"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <radialGradient id="glow" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#94d2bd" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#94d2bd" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0a9396" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#94d2bd" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#0a9396" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#e2e8f0" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="960" height="480" fill="url(#bg)"/>
  <rect width="960" height="480" fill="url(#grid)"/>
  <ellipse cx="320" cy="300" rx="320" ry="220" fill="url(#glow)" filter="url(#soft)"/>

  <g transform="rotate(141 480 240)" opacity="0.9">
    <rect x="-120" y="-100" width="1200" height="2" fill="url(#line)"/>
    <rect x="-120" y="-58" width="1200" height="2" fill="url(#line)"/>
    <rect x="-120" y="-16" width="1200" height="2" fill="url(#line)"/>
    <rect x="-120" y="26" width="1200" height="2" fill="url(#line)"/>
    <rect x="-120" y="68" width="1200" height="2" fill="url(#line)"/>
    <rect x="-120" y="110" width="1200" height="2" fill="url(#line)"/>
    <rect x="-120" y="152" width="1200" height="2" fill="url(#line)"/>
    <rect x="-120" y="194" width="1200" height="2" fill="url(#line)"/>
    <rect x="-120" y="236" width="1200" height="2" fill="url(#line)"/>
    <rect x="-120" y="278" width="1200" height="2" fill="url(#line)"/>
    <rect x="-120" y="320" width="1200" height="2" fill="url(#line)"/>
    <rect x="-120" y="362" width="1200" height="2" fill="url(#line)"/>
    <rect x="-120" y="404" width="1200" height="2" fill="url(#line)"/>
    <rect x="-120" y="446" width="1200" height="2" fill="url(#line)"/>
    <rect x="-120" y="488" width="1200" height="2" fill="url(#line)"/>
    <rect x="-120" y="530" width="1200" height="2" fill="url(#line)"/>
    <rect x="-120" y="572" width="1200" height="2" fill="url(#line)"/>
    <rect x="-120" y="614" width="1200" height="2" fill="url(#line)"/>
    <rect x="-120" y="656" width="1200" height="2" fill="url(#line)"/>
    <rect x="-120" y="698" width="1200" height="2" fill="url(#line)"/>
  </g>

  <g fill="none" stroke="#94d2bd" stroke-opacity="0.75" stroke-width="3">
    <circle cx="520" cy="215" r="88"/>
    <circle cx="520" cy="215" r="54" stroke-opacity="0.45"/>
  </g>
  <circle cx="520" cy="215" r="8" fill="#94d2bd"/>

  <g transform="translate(76,120)">
    <text x="0" y="0" fill="#e2e8f0" fill-opacity="0.9" font-size="20" font-family="Atkinson Hyperlegible, ui-sans-serif, system-ui" letter-spacing="4">VECTORCHORD LABS</text>
    <text x="0" y="86" fill="#f8fafc" font-size="54" font-weight="700" font-family="Atkinson Hyperlegible, ui-sans-serif, system-ui">20-Min Build</text>
    <rect x="0" y="116" width="360" height="3" fill="#94d2bd" fill-opacity="0.85"/>
    <text x="0" y="168" fill="#cbd5e1" font-size="24" font-family="Atkinson Hyperlegible, ui-sans-serif, system-ui">vectorchord 100m indexing 20 minutes</text>
  </g>
</svg>
