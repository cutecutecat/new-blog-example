<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="960" height="480" viewBox="0 0 960 480" role="img" aria-label="Vechord Python cover">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#082f49"/>
      <stop offset="55%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <radialGradient id="glow" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#f0abfc" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#f0abfc" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#f0abfc" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#e2e8f0" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="960" height="480" fill="url(#bg)"/>
  <rect width="960" height="480" fill="url(#grid)"/>
  <ellipse cx="600" cy="90" rx="320" ry="220" fill="url(#glow)" filter="url(#soft)"/>

  <g transform="rotate(108 480 240)" opacity="0.9">
    <rect x="-120" y="-100" width="1200" height="2" fill="url(#line)"/>
    <rect x="-120" y="-70" width="1200" height="2" fill="url(#line)"/>
    <rect x="-120" y="-40" width="1200" height="2" fill="url(#line)"/>
    <rect x="-120" y="-10" width="1200" height="2" fill="url(#line)"/>
    <rect x="-120" y="20" width="1200" height="2" fill="url(#line)"/>
    <rect x="-120" y="50" width="1200" height="2" fill="url(#line)"/>
    <rect x="-120" y="80" width="1200" height="2" fill="url(#line)"/>
    <rect x="-120" y="110" width="1200" height="2" fill="url(#line)"/>
    <rect x="-120" y="140" width="1200" height="2" fill="url(#line)"/>
    <rect x="-120" y="170" width="1200" height="2" fill="url(#line)"/>
    <rect x="-120" y="200" width="1200" height="2" fill="url(#line)"/>
    <rect x="-120" y="230" width="1200" height="2" fill="url(#line)"/>
    <rect x="-120" y="260" width="1200" height="2" fill="url(#line)"/>
    <rect x="-120" y="290" width="1200" height="2" fill="url(#line)"/>
    <rect x="-120" y="320" width="1200" height="2" fill="url(#line)"/>
    <rect x="-120" y="350" width="1200" height="2" fill="url(#line)"/>
    <rect x="-120" y="380" width="1200" height="2" fill="url(#line)"/>
    <rect x="-120" y="410" width="1200" height="2" fill="url(#line)"/>
    <rect x="-120" y="440" width="1200" height="2" fill="url(#line)"/>
    <rect x="-120" y="470" width="1200" height="2" fill="url(#line)"/>
  </g>

  <g fill="none" stroke="#f0abfc" stroke-opacity="0.75" stroke-width="3">
    <circle cx="520" cy="320" r="88"/>
    <circle cx="520" cy="320" r="54" stroke-opacity="0.45"/>
  </g>
  <circle cx="520" cy="320" r="8" fill="#f0abfc"/>

  <g transform="translate(76,120)">
    <text x="0" y="0" fill="#e2e8f0" fill-opacity="0.9" font-size="20" font-family="Atkinson Hyperlegible, ui-sans-serif, system-ui" letter-spacing="4">VECTORCHORD LABS</text>
    <text x="0" y="86" fill="#f8fafc" font-size="54" font-weight="700" font-family="Atkinson Hyperlegible, ui-sans-serif, system-ui">Vechord Python</text>
    <rect x="0" y="116" width="360" height="3" fill="#f0abfc" fill-opacity="0.85"/>
    <text x="0" y="168" fill="#cbd5e1" font-size="24" font-family="Atkinson Hyperlegible, ui-sans-serif, system-ui">introducing vechord</text>
  </g>
</svg>
