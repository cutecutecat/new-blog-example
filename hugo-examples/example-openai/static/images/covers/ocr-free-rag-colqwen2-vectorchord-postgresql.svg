    <rect x="-120" y="82" width="1200" height="2" fill="url(#line)"/>
    <rect x="-120" y="108" width="1200" height="2" fill="url(#line)"/>
    <rect x="-120" y="134" width="1200" height="2" fill="url(#line)"/>
    <rect x="-120" y="160" width="1200" height="2" fill="url(#line)"/>
